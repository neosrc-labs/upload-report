name: 'Upload Report'
description: 'Upload, update, or remove a PR report'

inputs:
  action:
    description: 'Action to perform: upload (default), mark-as-outdated, remove'
    required: false
    default: 'upload'
  api-url:
    description: 'API endpoint URL'
    required: false
    default: 'https://neosrc.dev/api/reports'
  provider:
    description: 'Git provider'
    required: false
    default: 'github'
  repository:
    description: 'Repository (owner/repo)'
    required: false
    default: ${{ github.repository }}
  pr-number:
    description: 'PR number (auto-detected from event context if omitted)'
    required: false
  name:
    description: 'Unique report name (defaults to lower-kebab-case of title for upload)'
    required: false
  title:
    description: 'Report title (required for upload)'
    required: false
  description:
    description: 'Report description'
    required: false
    default: ''
  commit-sha:
    description: 'Commit SHA'
    required: false
    default: ${{ github.sha }}
  type:
    description: 'Report type'
    required: false
    default: 'markdown'
  data:
    description: 'Inline report content'
    required: false
  data-file:
    description: 'Path to file containing report content'
    required: false
  source-url:
    description: 'Source URL for the report (defaults to the GitHub Actions run URL)'
    required: false
  oidc-audience:
    description: 'OIDC token audience (must match server config)'
    required: false
    default: 'https://neosrc.dev'

runs:
  using: 'composite'
  steps:
    - name: Upload report
      shell: bash
      run: |
        set -euo pipefail

        ACTION="${INPUT_ACTION:-upload}"

        # -- resolve pr-number (needed by all actions) --
        PR_NUMBER="${INPUT_PR_NUMBER:-}"
        if [ -z "$PR_NUMBER" ]; then
          PR_NUMBER="${GITHUB_EVENT_PR_NUMBER:-}"
        fi
        if [ -z "$PR_NUMBER" ]; then
          PR_NUMBER="${GITHUB_EVENT_ISSUE_NUMBER:-}"
        fi
        if [ -z "$PR_NUMBER" ]; then
          echo "::error::Could not determine PR number. Pass it explicitly via 'pr-number' input."
          exit 1
        fi

        # -- request OIDC token (needed by all actions) --
        if [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
          echo "::error::Missing ACTIONS_ID_TOKEN_REQUEST_TOKEN. Add 'permissions: id-token: write' to the workflow."
          exit 1
        fi

        OIDC_TOKEN="$(curl -sS -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL:-}&audience=${INPUT_OIDC_AUDIENCE:-https://neosrc.dev}" \
          | jq -r '.value')"

        if [ -z "$OIDC_TOKEN" ] || [ "$OIDC_TOKEN" = "null" ]; then
          echo "::error::Failed to obtain OIDC token. Ensure 'id-token: write' permission is set."
          exit 1
        fi

        echo "Obtained OIDC token (length: ${#OIDC_TOKEN})"

        API_URL="${INPUT_API_URL:-https://neosrc.dev/api/reports}"
        RESPONSE_FILE="$(mktemp)"
        HTTP_CODE=

        # -- resolve name --
        if [ -z "${INPUT_NAME:-}" ]; then
          if [ -z "${INPUT_TITLE:-}" ]; then
            echo "::error::'name' or 'title' is required for this action."
            exit 1
          fi
          INPUT_NAME="$(echo "$INPUT_TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g; s/-\{2,\}/-/g; s/^-//; s/-$//')"
        fi

        if [ "$ACTION" = "upload" ]; then
          # -- resolve report content source --
          HAS_DATA=false
          HAS_FILE=false
          if [ -n "${INPUT_DATA:-}" ]; then HAS_DATA=true; fi
          if [ -n "${INPUT_DATA_FILE:-}" ]; then HAS_FILE=true; fi

          if $HAS_DATA && $HAS_FILE; then
            echo "::error::Provide exactly one of 'data' or 'data-file', not both."
            exit 1
          fi

          if $HAS_FILE; then
            if [ ! -f "$INPUT_DATA_FILE" ]; then
              echo "::error::File not found: $INPUT_DATA_FILE"
              exit 1
            fi
            INPUT_DATA="$(cat "$INPUT_DATA_FILE")"
          fi

          if [ -z "${INPUT_DATA:-}" ]; then
            echo "::error::No report content provided. Use 'data' or 'data-file'."
            exit 1
          fi

          if [ -z "${INPUT_TITLE:-}" ]; then
            echo "::error::'title' is required for upload."
            exit 1
          fi

          # -- resolve source URL --
          SOURCE_URL="${INPUT_SOURCE_URL:-https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}}"

          # -- build JSON payload --
          JSON_PAYLOAD="$(jq -n \
            --arg provider       "${INPUT_PROVIDER:-github}" \
            --arg repository     "${INPUT_REPOSITORY:-}" \
            --argjson prNumber   "$PR_NUMBER" \
            --arg name           "$INPUT_NAME" \
            --arg title          "$INPUT_TITLE" \
            --arg description    "${INPUT_DESCRIPTION:-}" \
            --arg commitSha      "${INPUT_COMMIT_SHA:-}" \
            --arg sourceUrl      "$SOURCE_URL" \
            --arg type           "${INPUT_TYPE:-markdown}" \
            --arg data           "$INPUT_DATA" \
            '{
              provider:     $provider,
              repository:   $repository,
              prNumber:     $prNumber,
              name:         $name,
              title:        $title,
              description:  $description,
              commitSha:    $commitSha,
              sourceUrl:    $sourceUrl,
              type:         $type,
              data:         $data
            }')"

          echo "Uploading report to $API_URL"
          HTTP_CODE="$(curl -sS -o "$RESPONSE_FILE" -w "%{http_code}" \
            -L --location-trusted --retry 3 --retry-delay 5 --retry-connrefused \
            -X PUT "$API_URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -d "$JSON_PAYLOAD")"

        elif [ "$ACTION" = "mark-as-outdated" ]; then
          JSON_PAYLOAD="$(jq -n \
            --arg provider       "${INPUT_PROVIDER:-github}" \
            --arg repository     "${INPUT_REPOSITORY:-}" \
            --argjson prNumber   "$PR_NUMBER" \
            --arg name           "$INPUT_NAME" \
            --arg state          "OUTDATED" \
            '{
              provider:   $provider,
              repository: $repository,
              prNumber:   $prNumber,
              name:       $name,
              state:      $state
            }')"

          echo "Marking report as outdated at $API_URL"
          HTTP_CODE="$(curl -sS -o "$RESPONSE_FILE" -w "%{http_code}" \
            -L --location-trusted --retry 3 --retry-delay 5 --retry-connrefused \
            -X POST "$API_URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -d "$JSON_PAYLOAD")"

        elif [ "$ACTION" = "remove" ]; then
          JSON_PAYLOAD="$(jq -n \
            --arg provider       "${INPUT_PROVIDER:-github}" \
            --arg repository     "${INPUT_REPOSITORY:-}" \
            --argjson prNumber   "$PR_NUMBER" \
            --arg name           "$INPUT_NAME" \
            '{
              provider:   $provider,
              repository: $repository,
              prNumber:   $prNumber,
              name:       $name
            }')"

          echo "Removing report at $API_URL"
          HTTP_CODE="$(curl -sS -o "$RESPONSE_FILE" -w "%{http_code}" \
            -L --location-trusted --retry 3 --retry-delay 5 --retry-connrefused \
            -X DELETE "$API_URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -d "$JSON_PAYLOAD")"

        else
          echo "::error::Unknown action: $ACTION. Supported: upload, mark-as-outdated, remove."
          exit 1
        fi

        if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
          echo "::error::Request failed with HTTP $HTTP_CODE"
          cat "$RESPONSE_FILE"
          rm -f "$RESPONSE_FILE"
          exit 1
        fi

        echo "Report action completed successfully (HTTP $HTTP_CODE)"
        cat "$RESPONSE_FILE"
        rm -f "$RESPONSE_FILE"
      env:
        INPUT_ACTION: ${{ inputs.action }}
        INPUT_API_URL: ${{ inputs.api-url }}
        INPUT_PROVIDER: ${{ inputs.provider }}
        INPUT_REPOSITORY: ${{ inputs.repository }}
        INPUT_PR_NUMBER: ${{ inputs.pr-number }}
        INPUT_NAME: ${{ inputs.name }}
        INPUT_TITLE: ${{ inputs.title }}
        INPUT_DESCRIPTION: ${{ inputs.description }}
        INPUT_COMMIT_SHA: ${{ inputs.commit-sha }}
        INPUT_TYPE: ${{ inputs.type }}
        INPUT_DATA: ${{ inputs.data }}
        INPUT_DATA_FILE: ${{ inputs.data-file }}
        INPUT_SOURCE_URL: ${{ inputs.source-url }}
        INPUT_OIDC_AUDIENCE: ${{ inputs.oidc-audience }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        GITHUB_EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
        GITHUB_EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
